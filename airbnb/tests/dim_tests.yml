models:
  - name: dim_listings_cleansed
    description: Cleansed table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 100

    columns:
      - name: listing_id
        description: Primary key for listing dim.
        data_tests:
          - not_null
          - unique

      - name: listing_name
        description: Name of the listing.
        data_tests:
          - not_null
          
      - name: host_id
        description: The host's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: price
        description: Price of the listing.
        data_tests:
          - not_null

      - name: room_type
        description: Type of the apartment / room
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room','Hotel room']
                
      - name: minimum_nights
        data_tests:
          - positive_values
        
  - name: dim_hosts_cleansed
    config:
        contract:
          enforced: true
    columns:
      - name: host_id
        data_type: integer
      - name: host_name
        data_type: string
      - name: is_superhost
        data_type: string
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp
